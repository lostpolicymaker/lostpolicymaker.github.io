# Curated DEF CON 34 (2026) Villages for the public policy community,
# ordered roughly by how useful a policy visitor is likely to find them.
# Full official roster: https://defcon.org/html/defcon-34/dc-34-villages.html
# img is optional - files live in img/villages/

- name: Policy @ DEF CON
  link: https://defcon.org/policy/
  img: policy.png
  description: The conference's own program for the public policy community - Policy Debriefs, Community Roundtables under Chatham House Rule, and an evening lounge where senior officials, researchers, and hackers mix. If you work in public policy, start here.

- name: Voting Village
  link:
  img: VotingVillageDC.jpg
  description: Hands-on election security with real voting machines, exploring election infrastructure from technical and public policy perspectives. A fixture of election security policy debates since 2017 - come see the machines yourself.

- name: AI Village
  link: https://aivillage.org
  img: aivillage_dc.jpg
  description: Hands-on AI security workshops and large language model exploitation challenges. Home of the AI red-teaming exercises that have shaped government thinking on AI evaluation - if you work on AI policy, this is where the rubber meets the road.

- name: ICS Village
  link: https://icsvillage.com
  img: ICS_Village.jpg
  description: Equips industry and policymakers to better defend industrial control systems through hands-on training on simulated environments. Built with policymakers in mind - the fastest way to understand critical infrastructure security debates.

- name: Biohacking Village
  link: https://villageb.io
  img: dc_bhv.jpg
  description: Healthcare and medical device security in a hands-on lab environment. Essential for anyone working on FDA device regulation, hospital cybersecurity, or health sector resilience - the village has long partnered with regulators and manufacturers.

- name: Aerospace Village
  link: https://aerospacevillage.org
  img: SecureAerospace.jpg
  description: Security researchers and the aviation and space industries working together toward safe, reliable, and trustworthy air travel. Directly relevant to aviation cybersecurity policy, airworthiness standards, and the fast-growing commercial space sector.

- name: Car Hacking Village
  link: https://carhackingvillage.com
  img: carhackvillage.jpg
  description: Hands-on vehicle exploitation with live CAN bus and wireless access, in collaboration with the automotive industry. Relevant to vehicle safety regulation, right-to-repair debates, and connected car privacy.

- name: Crypto & Privacy Village
  link: https://cryptovillage.org
  img: CryptoVillage.jpg
  description: Cryptography and privacy, from the latest technical techniques to public policy discussions. The place to pressure-test encryption policy, surveillance, and privacy legislation with people who build and break these systems.

- name: IoT Village
  link: https://iotvillage.org
  img: iot.png
  description: Expert talks, hands-on labs, and live bug hunting in Internet of Things devices. Directly relevant to IoT security legislation, labeling programs like the Cyber Trust Mark, and consumer device standards.

- name: Bug Bounty Village
  link: https://bugbountydefcon.com
  img: bugbounty.png
  description: The bug bounty hunter community, with talks, workshops, and competitive challenges. Directly relevant to coordinated vulnerability disclosure policy, safe harbor protections, and hacker liability law.

- name: Maritime Hacking Village
  link: https://maritimehackingvillage.com
  img: maritime.png
  description: Immersive maritime systems exploitation and defense training. Ports, shipping, and vessels are critical infrastructure carrying trillions in global commerce - this village is where their security gaps get demonstrated.

- name: Telecom Village
  link: https://telecomvillage.com
  img: telecom.png
  description: 4G/5G network security, signaling systems, and telecom threat detection. Timely grounding for telecom security policy in an era of carrier breaches and 5G supply chain debates.

- name: Quantum Village
  link: https://quantumvillage.org
  img: quantum.png
  description: Open quantum hardware access, talks, and hands-on activities in quantum technology and security. Where post-quantum cryptography migration and quantum policy meet the people doing the work.

- name: Social Engineering Community Village
  link: https://se.community
  img: socialeng.png
  description: Human-focused hacking through psychology and tactics, featuring live vishing (voice phishing) competitions. Watch a live call and you'll never think about fraud policy, or your own inbox, the same way.

- name: Recon Village
  link: https://reconvillage.org
  img: recon.png
  description: Reconnaissance and open-source intelligence, with live demos and capture the flags. An eye-opening look at how much personal and organizational data is publicly discoverable - fuel for privacy and data broker policy.

- name: Tamper-Evident Village
  link:
  description: How tamper-evident seals work - and how they can be defeated - through hands-on contests. Sobering context for anyone who relies on seals in elections, evidence handling, or supply chain integrity.

- name: Lock Pick Village
  link: https://toool.us
  img: toool.png
  description: One of the most hands-on experiences at DEF CON, run by TOOOL. Pick your first lock in under five minutes and gain a visceral understanding of why physical security - and security generally - is more nuanced than it looks.
